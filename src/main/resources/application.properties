# ===============================
# SERVER
# ===============================
server.port=8083
server.address=0.0.0.0
server.servlet.context-path=/api


# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/callapp_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# ===============================
# JPA & HIBERNATE
# ===============================
# create = Hibernate borra y recrea el schema (usar para limpiar conflictos de versiones)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SECURITY & CORS
# ===============================
jwt.secret=${JWT_SECRET:change_this_secret_in_production_environment_1234567890}
jwt.expiration=86400000
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://thick-coats-turn.loca.lt,http://172.46.12.57:5173,http://172.46.12.57:5174,http://192.168.8.161:5173,http://192.168.8.161:5174,http://172.46.8.194:5173,http://172.46.8.194:3000}
app.security.rate-limit.enabled=true
app.security.rate-limit.requests-per-minute=60

# ===============================
# EMAIL (SMTP)
# ===============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:tu_correo@gmail.com}
spring.mail.password=${SMTP_PASS:tu_password_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.notifications.email-enabled=true
app.notifications.university-recipients=${NOTIF_RECIPIENTS:admin@tu-universidad.edu.co}
app.mail.from-name=GEA
app.frontend-base-url=${FRONTEND_URL:http://localhost:5173}

# ===============================
# FILES
# ===============================
file.upload-dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.allowed-extensions=jpg,jpeg,png,pdf
file.allowed-content-types=image/jpeg,image/png,application/pdf

# ===============================
# AUDIT (ENVERS)
# ===============================
spring.jpa.properties.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.hibernate.envers.global_with_modified_flag=true
spring.jpa.properties.hibernate.envers.audit_table_suffix=_audit

# ===============================
# DOCUMENTATION (SWAGGER)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ===============================
# SYSTEM
# ===============================
spring.main.headless=true
