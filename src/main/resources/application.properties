# ===============================
# SERVER
# ===============================
server.port=8083
server.address=0.0.0.0
server.servlet.context-path=/api


# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gea_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# ===============================
# JPA & HIBERNATE
# ===============================
# ATENCION: En produccion usar 'validate' o 'none'. 'update' puede corromper datos.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SECURITY & CORS
# ===============================
# REQUERIDO: Minimo 32 caracteres. NUNCA usar el valor por defecto en produccion.
jwt.secret=${JWT_SECRET:dev_only_change_this_secret_in_production_min32chars}
jwt.expiration=86400000
# En produccion, definir CORS_ALLOWED_ORIGINS solo con los dominios reales de la app.
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://[IP_ADDRESS],http://[IP_ADDRESS],http://[IP_ADDRESS],http://[IP_ADDRESS],http://[IP_ADDRESS],http://[IP_ADDRESS],http://[IP_ADDRESS]}
app.security.rate-limit.enabled=true
app.security.rate-limit.requests-per-minute=60

# ===============================
# EMAIL (SMTP)
# ===============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:gea.notificaciones@unilibrecucuta.edu.co}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.notifications.email-enabled=true
app.notifications.university-recipients=${NOTIF_RECIPIENTS:}
app.notifications.published-recipients=${PUBLISHED_RECIPIENTS:}
app.mail.from-name=GEA
app.frontend-base-url=${FRONTEND_URL:http://localhost:5173}

# ===============================
# FILES
# ===============================
file.upload-dir=${UPLOAD_DIR:uploads/}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.allowed-extensions=jpg,jpeg,png,pdf
file.allowed-content-types=image/jpeg,image/png,application/pdf

# ===============================
# AUDIT (ENVERS)
# ===============================
spring.jpa.properties.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.hibernate.envers.global_with_modified_flag=true
spring.jpa.properties.hibernate.envers.audit_table_suffix=_audit

# ===============================
# DOCUMENTATION (SWAGGER)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ===============================
# SYSTEM
# ===============================
# spring.main.headless=true

# ===============================
# ASYNC POOL (notificaciones)
# ===============================
app.async.notifications.core-pool-size=${NOTIF_POOL_CORE:3}
app.async.notifications.max-pool-size=${NOTIF_POOL_MAX:6}
app.async.notifications.queue-capacity=${NOTIF_QUEUE_CAPACITY:30}
